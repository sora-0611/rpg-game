<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>戦闘画面</title>
<link rel="stylesheet" href="battle.css" />
</head>
<body>
<div class="battle-screen" id="battle-screen">
  <button class="hamburger-button" id="menu-button" aria-label="メニュー">三</button>

  <!-- 敵関連: 敵イメージ、HP関連 -->
  <section class="enemy-area">
    <div class="hp-block">
      <div class="hp-block-row">
        <span class="hp-label">HP</span>
        <div class="hp-bar"><div class="hp-bar-fill" id="enemy-hp-fill"></div></div>
      </div>
      <span class="hp-value" id="enemy-hp-value"></span>
    </div>
    <div class="enemy-box" id="enemy-box">
      <div class="avatar-placeholder" id="enemy-avatar">敵</div>
      <div class="enemy-name" id="enemy-name">敵</div>
      <div class="enemy-rank-tag" id="enemy-rank-tag"></div>
      <div class="enemy-stats-line" id="enemy-stats-line"></div>
    </div>
  </section>

  <!-- 味方関連: キャラクター3人のステータスカード -->
  <section class="party-status-list" id="party-status-list"></section>

  <!-- プレイヤー関連: 行動中キャラクターのイメージ表示（HPはパーティーステータスカードに統合） -->
  <section class="player-area">
    <div class="player-box" id="player-box">
      <div class="avatar-placeholder" id="player-avatar"></div>
      <div class="player-name" id="player-name"></div>
    </div>
  </section>

  <!-- コマンド: 戦う/防御/アイテム/逃げる -->
  <section class="command-area" id="command-area">
    <button class="command-button" id="btn-fight">戦う</button>
    <button class="command-button" id="btn-item">アイテム</button>
    <button class="command-button" id="btn-defend">防御</button>
    <button class="command-button" id="btn-flee">逃げる</button>
    <button class="command-button command-end" id="btn-end" hidden disabled>戦闘終了</button>
  </section>

  <!-- テキストウィンドウ: イベントテキスト / 確認はい・いいえ -->
  <section class="message-window" id="message-window" aria-live="polite">
    <p class="message-text" id="message-text"></p>
    <div class="confirm-buttons" id="confirm-buttons" hidden>
      <button class="text-button" id="confirm-yes">はい</button>
      <button class="text-button" id="confirm-no">いいえ</button>
    </div>
  </section>

  <!-- アイテムウィンドウ -->
  <aside class="side-window item-window" id="item-window" hidden>
    <div class="side-window-header">アイテム</div>
    <ul class="item-list" id="item-list"></ul>
    <button class="close-button" id="item-close-button">×閉じる</button>
  </aside>

  <!-- 逃げるウィンドウ -->
  <aside class="side-window flee-window" id="flee-window" hidden>
    <div class="side-window-header">逃げる</div>
    <div class="flee-window-body">
      <button class="text-button" id="flee-yes-button">逃げる</button>
      <button class="text-button" id="flee-no-button">逃げない</button>
    </div>
    <button class="close-button" id="flee-close-button">×閉じる</button>
  </aside>

  <!-- メニューウィンドウ -->
  <aside class="side-window menu-window" id="menu-window" hidden>
    <div class="side-window-header">メニュー</div>
    <ul class="menu-list">
      <li><button class="menu-item-button" id="menu-title-button">タイトルへ</button></li>
      <li><button class="menu-item-button" id="menu-settings-button">設定</button></li>
    </ul>
    <button class="close-button" id="menu-close-button">×閉じる</button>
  </aside>

  <!-- タイトルへ戻る確認ダイアログ -->
  <div class="modal-scrim" id="title-confirm-scrim" hidden>
    <div class="modal-dialog">
      <p class="modal-body">タイトルへ戻りますか？</p>
      <div class="modal-actions">
        <button class="text-button" id="title-confirm-no">いいえ</button>
        <button class="text-button danger-button" id="title-confirm-yes">はい</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>
</div>

<script src="data.js"></script>
<script src="battle.js"></script>
</body>
</html>
